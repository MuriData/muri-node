# Override: adds a local Avalanche L1 node (avago).
# Use with: docker compose -f docker-compose.yml -f docker-compose.avago.yml up -d
#
# Requires ~2-4 GB RAM during bootstrap, ~1-2 GB steady state.
# If you don't need a local node, the base compose uses an external RPC instead.

services:
  # ── Avalanche L1 RPC Node ──
  # Host networking so avago P2P (9651) is directly reachable.
  avago:
    image: ghcr.io/muridata/murichain-subnet-evm:latest
    network_mode: host
    volumes:
      - avago_data:/root/.avalanchego
      - ./avago/node.json:/root/.avalanchego/configs/node.json:ro
      - ./avago/chain-config.json:/root/.avalanchego/configs/chains/inP2vNhcVSABGmq39UHwuB9tDxUUWp3g6gpRwdE6TqtAtAWmu/config.json:ro
    environment:
      - AVAGO_CONFIG_FILE=/root/.avalanchego/configs/node.json
    restart: unless-stopped

  # Override murid to depend on avago and use local RPC
  murid:
    depends_on:
      avago:
        condition: service_started
      ipfs:
        condition: service_healthy
    environment:
      - MURID_RPC_URL=http://127.0.0.1:9650/ext/bc/inP2vNhcVSABGmq39UHwuB9tDxUUWp3g6gpRwdE6TqtAtAWmu/rpc
      - MURID_CHAIN_ID=97981
      - MURID_MARKET_ADDRESS=0xaab9f94671d6b22eee60509b5c3149e90a78fb54
      - MURID_IPFS_URL=http://127.0.0.1:5001
      - MURID_KEYS_DIR=/app/keys
      - MURID_DATA_DIR=/app/data

volumes:
  avago_data:
