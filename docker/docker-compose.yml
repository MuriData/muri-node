# Base compose: IPFS + murid only.
# Uses an external RPC by default (lightweight, no avago needed).
#
# Usage:
#   Lightweight (external RPC):
#     docker compose run --rm murid init    # set RPC URL during setup
#     docker compose up -d
#
#   Full node (local avago):
#     docker compose -f docker-compose.yml -f docker-compose.avago.yml run --rm murid init
#     docker compose -f docker-compose.yml -f docker-compose.avago.yml up -d

services:
  # ── IPFS (Kubo) ──
  # Host networking for better DHT discoverability — peers connect directly
  # without Docker NAT. Exposes ports 4001 (swarm), 5001 (API), 8080 (gateway).
  ipfs:
    image: ipfs/kubo:latest
    network_mode: host
    volumes:
      - ipfs_data:/data/ipfs
      - ./ipfs/001-bind-localhost.sh:/container-init.d/001-bind-localhost.sh:ro
    environment:
      - IPFS_PROFILE=flatfs
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── MuriData Storage Node ──
  murid:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    network_mode: host
    depends_on:
      ipfs:
        condition: service_healthy
    volumes:
      - ./node:/app
    environment:
      # Defaults for "murid init" wizard (shown in [brackets] during prompts)
      # Points at public testnet RPC by default (no local avago needed)
      - MURID_RPC_URL=https://testnet-rpc.muri.moe/ext/bc/inP2vNhcVSABGmq39UHwuB9tDxUUWp3g6gpRwdE6TqtAtAWmu/rpc
      - MURID_CHAIN_ID=97981
      - MURID_MARKET_ADDRESS=0xaab9f94671d6b22eee60509b5c3149e90a78fb54
      - MURID_IPFS_URL=http://127.0.0.1:5001
      - MURID_KEYS_DIR=/app/keys
      - MURID_DATA_DIR=/app/data
    restart: unless-stopped

volumes:
  ipfs_data:
